<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430"><rect width="100%" height="100%" fill="#ffffff"/><text x="30" y="26" font-size="18" text-anchor="start" font-weight="bold" fill="#111" font-family="Arial,Helvetica,sans-serif">Feature clusters by |r| &gt;= 0.80</text><text x="30" y="42" font-size="11" text-anchor="start" font-weight="normal" fill="#444" font-family="Arial,Helvetica,sans-serif">Each card shows a redundant block and the feature(s) worth keeping as representatives.</text><rect x="30" y="60" width="310" height="104" rx="14" fill="#f7f9fb" stroke="#d9e2ec"/><text x="46" y="84" font-size="13" text-anchor="start" font-weight="bold" fill="#123" font-family="Arial,Helvetica,sans-serif">Cluster 1 (13 features)</text><text x="46" y="102" font-size="11" text-anchor="start" font-weight="normal" fill="#333" font-family="Arial,Helvetica,sans-serif">Representative: mou_Mean</text><text x="46" y="122" font-size="10" text-anchor="start" font-weight="normal" fill="#555" font-family="Arial,Helvetica,sans-serif">avgmou, avgqty, avg3mou, avg3qty, avg6mou</text><text x="46" y="137" font-size="10" text-anchor="start" font-weight="normal" fill="#555" font-family="Arial,Helvetica,sans-serif">avg6qty, mou_Mean, attempt_Mean, complete_Mean</text><text x="46" y="152" font-size="10" text-anchor="start" font-weight="normal" fill="#555" font-family="Arial,Helvetica,sans-serif">mou_cvce_Mean, mou_rvce_Mean, mou_opkv_Mean</text><text x="46" y="167" font-size="10" text-anchor="start" font-weight="normal" fill="#555" font-family="Arial,Helvetica,sans-serif">mou_peav_Mean</text><rect x="360" y="60" width="310" height="104" rx="14" fill="#f7f9fb" stroke="#d9e2ec"/><text x="376" y="84" font-size="13" text-anchor="start" font-weight="bold" fill="#123" font-family="Arial,Helvetica,sans-serif">Cluster 2 (5 features)</text><text x="376" y="102" font-size="11" text-anchor="start" font-weight="normal" fill="#333" font-family="Arial,Helvetica,sans-serif">Representative: totcalls</text><text x="376" y="122" font-size="10" text-anchor="start" font-weight="normal" fill="#555" font-family="Arial,Helvetica,sans-serif">totcalls, totmou, adjmou, totrev, adjrev</text><rect x="30" y="180" width="310" height="104" rx="14" fill="#f7f9fb" stroke="#d9e2ec"/><text x="46" y="204" font-size="13" text-anchor="start" font-weight="bold" fill="#123" font-family="Arial,Helvetica,sans-serif">Cluster 3 (3 features)</text><text x="46" y="222" font-size="11" text-anchor="start" font-weight="normal" fill="#333" font-family="Arial,Helvetica,sans-serif">Representative: custcare_Mean</text><text x="46" y="242" font-size="10" text-anchor="start" font-weight="normal" fill="#555" font-family="Arial,Helvetica,sans-serif">custcare_Mean, ccrndmou_Mean, cc_mou_Mean</text><rect x="360" y="180" width="310" height="104" rx="14" fill="#f7f9fb" stroke="#d9e2ec"/><text x="376" y="204" font-size="13" text-anchor="start" font-weight="bold" fill="#123" font-family="Arial,Helvetica,sans-serif">Cluster 4 (3 features)</text><text x="376" y="222" font-size="11" text-anchor="start" font-weight="normal" fill="#333" font-family="Arial,Helvetica,sans-serif">Representative: rev_Mean</text><text x="376" y="242" font-size="10" text-anchor="start" font-weight="normal" fill="#555" font-family="Arial,Helvetica,sans-serif">rev_Mean, avg3rev, avg6rev</text><rect x="30" y="300" width="310" height="104" rx="14" fill="#f7f9fb" stroke="#d9e2ec"/><text x="46" y="324" font-size="13" text-anchor="start" font-weight="bold" fill="#123" font-family="Arial,Helvetica,sans-serif">Cluster 5 (2 features)</text><text x="46" y="342" font-size="11" text-anchor="start" font-weight="normal" fill="#333" font-family="Arial,Helvetica,sans-serif">Representative: drop_blk_Mean</text><text x="46" y="362" font-size="10" text-anchor="start" font-weight="normal" fill="#555" font-family="Arial,Helvetica,sans-serif">blck_vce_Mean, drop_blk_Mean</text></svg>